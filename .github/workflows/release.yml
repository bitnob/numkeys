name: Release Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-13
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        shell: bash
        run: |
          cargo build --release --target "${{ matrix.target }}" --bin numkeys --bin numkeys-node --bin issuer-node

      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME:-dev}"
          TARGET="${{ matrix.target }}"
          STAGE_DIR="numkeys-${VERSION}-${TARGET}"
          mkdir -p "$STAGE_DIR"

          EXT=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            EXT=".exe"
          fi

          cp "target/${TARGET}/release/numkeys${EXT}" "$STAGE_DIR/"
          cp "target/${TARGET}/release/numkeys-node${EXT}" "$STAGE_DIR/"
          cp "target/${TARGET}/release/issuer-node${EXT}" "$STAGE_DIR/"

          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            ARCHIVE="${STAGE_DIR}.zip"
            7z a "$ARCHIVE" "$STAGE_DIR" >/dev/null
          else
            ARCHIVE="${STAGE_DIR}.tar.gz"
            tar -czf "$ARCHIVE" "$STAGE_DIR"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            numkeys-${{ github.ref_name }}-${{ matrix.target }}.*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          find dist -type f \( -name "*.tar.gz" -o -name "*.zip" \) -print0 | while IFS= read -r -d '' archive; do
            sha256sum "$archive" > "${archive}.sha256"
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/numkeys-*.tar.gz
            dist/**/numkeys-*.zip
            dist/**/numkeys-*.sha256
