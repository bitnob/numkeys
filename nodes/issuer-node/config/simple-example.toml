# Example configuration for a standard issuer deployment
# The issuer domain is the authoritative signer identity for attestations.

# The address where the issuer service binds
bind_address = "0.0.0.0:3000"

# The issuer domain where the service is running and the public key is served
domain = "issuer.example.com"

# Private key path (generate with numkeys-cli or similar)
# In production, use environment variables or secure key management
# private_key_path = "/path/to/private.key"
